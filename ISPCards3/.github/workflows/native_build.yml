name: Android Build ISP
on:
  workflow_dispatch: # يسمح بالتشغيل اليدوي من أي فرع (مثل ISP)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: npm install

      - name: Build APK Locally
        # استخدام --non-interactive لضمان عدم توقف السيرفر
        run: npx eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-isp
          path: "*.apk"
